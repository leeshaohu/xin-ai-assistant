name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af 2>/dev/null || true
          df -h /
          echo "✅ disk freed"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update -qq
          sudo apt install -y \
            python3-pip python3-dev python3-setuptools \
            git zip unzip wget curl \
            autoconf automake libtool pkg-config \
            libltdl-dev libffi-dev libssl-dev \
            libncurses5-dev libncursesw5-dev \
            build-essential cmake \
            zlib1g-dev libbz2-dev libreadline-dev \
            libsqlite3-dev libgdbm-dev libdb-dev \
            libexpat1-dev liblzma-dev tk-dev \
            libc6:i386 libstdc++6:i386 zlib1g:i386 \
            libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
            mesa-common-dev libglu1-mesa-dev \
            ccache
          echo "=== verifying mesa ==="
          dpkg -l | grep mesa
          ls -la /usr/include/GL/ 2>/dev/null && echo "✅ GL headers OK" || echo "❌ GL headers MISSING"

      - name: Cache Buildozer directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform
            ~/.cache/pip
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install Buildozer + Cython
        run: |
          pip3 install --upgrade pip setuptools wheel --break-system-packages
          pip3 install buildozer cython==0.29.33 --break-system-packages

      - name: Verify buildozer
        run: |
          buildozer --version
          which buildozer

      - name: Accept Android SDK licenses
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          cat > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license << 'LICENSE'
          8933bad161af4178b1185d1a37fbf41ea5269c55
          d56f5187479451eabf01fb78af6dfcb131a6481e
          24333f8a63b6825ea9c5514f83c2829b004d1fee
          LICENSE
          echo "✅ SDK licenses accepted"

      - name: Build APK
        run: |
          set -eo pipefail
          export PATH=$HOME/.buildozer/android/platform/apache-ant-1.9.4/bin:$PATH
          echo "=== disk space ===" && df -h .
          echo "=== running buildozer ==="
          buildozer -v android debug 2>&1 | tee build.log
          echo "=== files in bin/: ==="
          ls -la bin/ 2>/dev/null || echo "(bin/ does not exist)"
        timeout-minutes: 90

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Verify APK exists
        run: |
          if ls bin/*.apk 2>/dev/null; then
            echo "✅ APK found!"
            ls -lh bin/*.apk
          else
            echo "❌ No APK in bin/"
            find . -name "*.apk" 2>/dev/null || echo "No APK anywhere"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk
          retention-days: 90
